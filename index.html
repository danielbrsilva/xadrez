<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Xadrez</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="src/style.css">
</head>

<body>
    <div class="app">
        <h1>Xadrez</h1>

        <div class="game-container">
            <div class="board-section">
                <div id="capturedBlack" class="captured-bar"></div>

                <div class="board-area">
                    <div id="ranks" class="ranks"></div>
                    <div>
                        <div id="tabuleiro" class="tabuleiro"></div>
                        <div id="files" class="files"></div>
                    </div>
                </div>

                <div id="capturedWhite" class="captured-bar"></div>
            </div>

            <div class="side-panel">
                <div id="status" class="status">Turno das brancas</div>
                <button id="btnFlip" class="btn-flip">Inverter tabuleiro</button>
                <button id="btnRestart" class="btn-reiniciar">Reiniciar</button>

                <div class="panel-box historico-box">
                    <h3 class="panel-title">Histórico</h3>
                    <div id="historico" class="historico"></div>
                </div>

                <div class="panel-box">
                    <h3 class="panel-title">Como jogar</h3>
                    <ul class="como-jogar">
                        <li>Clique para selecionar uma peça</li>
                        <li>Pontos verdes = movimentos válidos</li>
                        <li>Borda azul piscando = roque disponível</li>
                        <li>Peão na última fileira = escolha a promoção</li>
                    </ul>
                </div>
            </div>
        </div>
    </div>

    <div id="promocaoModal" class="promocao-overlay">
        <div class="promocao-caixa">
            <p class="promocao-titulo">Promover peão</p>
            <div class="promocao-opcoes">
                <button class="promocao-btn" data-peca="Q">
                    <span class="promo-simbolo">♕</span>
                    <span class="promo-nome">Dama</span>
                </button>
                <button class="promocao-btn" data-peca="R">
                    <span class="promo-simbolo">♖</span>
                    <span class="promo-nome">Torre</span>
                </button>
                <button class="promocao-btn" data-peca="B">
                    <span class="promo-simbolo">♗</span>
                    <span class="promo-nome">Bispo</span>
                </button>
                <button class="promocao-btn" data-peca="N">
                    <span class="promo-simbolo">♘</span>
                    <span class="promo-nome">Cavalo</span>
                </button>
            </div>
        </div>
    </div>

    <script src="src/script.js"></script>
</body>

</html>
